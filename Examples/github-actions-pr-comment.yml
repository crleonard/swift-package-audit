name: Swift Package Audit

on:
  pull_request:

jobs:
  swift-package-audit:
    runs-on: macos-15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Run Swift Package Audit
        run: swift run swift-package-audit scan --format pr-comment --fail-on error > swift-package-audit.md
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: swift-package-audit.md
