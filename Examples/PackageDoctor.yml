failOn:
  - missingPackageResolved
  - packageReferencedButNotResolved
  - branchDependency
  - outdatedVersion

allow:
  branchDependencies:
    - InternalDesignSystem

ignore:
  packages:
    - SomeLegacyPackage
  rules:
    - exactVersionDependency

rules:
  requirePackageResolved: true
  allowExactVersions: false
