name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

  swift-package-audit:
    name: Swift Package Audit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Run Swift Package Audit
        run: swift run swift-package-audit scan --fail-on error
